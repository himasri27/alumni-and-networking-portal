<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>
</head>

<body>

<h1>Welcome to Alumni Network</h1>

<h2>Create Post</h2>

<form method="POST">
<textarea name="post"></textarea>
<br>
<button type="submit">Post</button>
</form>

<h2>Posts</h2>

{% for post in posts %}
<p>{{post.content}}</p>
{% endfor %}

<h2>Alumni List</h2>

<ul>
{% for a in alumni %}
<li>{{a.name}} - Batch {{a.batch}}</li>
{% endfor %}
</ul>

</body>
</html>
